name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version from latest merged PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state merged --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            sed -i "s|>dev<|>PR #${PR}<|" index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
