<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Schnapp3 — Preview Test</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="version-badge">dev</div>
  <div id="app">
    <div id="panels">
      <div class="panel panel--active" id="palette-panel" data-panel="palette">
        <div id="palette"></div>
      </div>
      <div class="panel panel--active" id="workspace-panel" data-panel="workspace">
        <div id="workspace"></div>
      </div>
      <div class="panel" id="code-panel" data-panel="code">
        <pre id="code-output">(empty)</pre>
      </div>
      <div class="panel panel--active" id="viewport-panel" data-panel="3d"></div>
    </div>
    <div id="command-bar">
      <div id="autocomplete"></div>
      <div id="command-row">
        <input id="command-input" type="text" placeholder="show blocks 3d" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button id="command-go" type="button" aria-label="Run command">&#x25B6;</button>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
